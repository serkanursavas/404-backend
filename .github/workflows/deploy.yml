name: Deploy

on:
  push:
    branches: [staging, master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -q

      - name: Deploy to TEST
        if: github.ref == 'refs/heads/staging'
        run: |
          cp target/futza-0.0.1-SNAPSHOT.jar ~/404/404-backend/target/futza-staging.jar
          launchctl stop app.futza.test || true
          sleep 2
          launchctl start app.futza.test
          sleep 20
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8083/swagger-ui.html)
          echo "BE health: $HTTP"
          [ "$HTTP" = "302" ] || exit 1

      - name: Deploy to PROD
        if: github.ref == 'refs/heads/master'
        run: |
          cp target/futza-0.0.1-SNAPSHOT.jar ~/404/404-backend/target/futza-prod.jar
          launchctl stop app.futza.prod || true
          sleep 2
          launchctl start app.futza.prod
          sleep 25
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8084/swagger-ui.html)
          echo "BE health: $HTTP"
          [ "$HTTP" = "302" ] || exit 1
