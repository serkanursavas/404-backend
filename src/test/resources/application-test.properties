# ─── Test Profile ───────────────────────────────────────────────────────────────
# DataSource overridden by @ServiceConnection (TestContainers) — no manual URL here

# JPA — Flyway manages schema; JPA only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — run migrations on fresh TestContainers DB
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Envers rev table auto-create conflict (Flyway handles DDL)
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_log_table

# CORS — allow all in test
cors.allowed-origins=http://localhost:5173

# Logging — quiet for tests
logging.level.root=WARN
logging.level.org.flywaydb=INFO
logging.level.com.squad=DEBUG
