spring.datasource.url=jdbc:postgresql://localhost:5434/squad_prod
spring.datasource.username=${DB_USERNAME_PROD}
spring.datasource.password=${DB_PASSWORD_PROD}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=false
server.port=8084
logging.file.name=/opt/homebrew/var/log/squad/prod.log
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
