# Application Name
spring.application.name=squad

# Spring Boot Port Configuration (default 8080)
server.port=8080

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/my_database
spring.datasource.username=app_user
spring.datasource.password=K8m#P2@vL7$nR9&q
spring.jpa.properties.hibernate.default_schema=public

# Spring Security (Disable by Exclusion)
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Exception Handling and Resources
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Spring Boot'un saat dilimini kesin olarak Europe/Istanbul yap
spring.jackson.time-zone=Europe/Istanbul

# Hibernate'in PostgreSQL ile ayn? saat dilimini kullanmas?n? sa?la
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Istanbul

spring.jpa.open-in-view=true

# JWT Secret Key (Environment Variable)
JWT_SECRET_KEY=${JWT_SECRET_KEY}


# RLS debug logging
logging.level.com.squad.squad.filter.JwtAuthenticationFilter=DEBUG
logging.level.com.squad.squad.config.RLSHelper=DEBUG

# GameService debug logging
logging.level.com.squad.squad.service.impl.GameServiceImpl=DEBUG
logging.level.com.squad.squad.controller.GameController=DEBUG

# Disable SQL logs to reduce noise
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN